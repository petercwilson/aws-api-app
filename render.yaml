services:
  - type: web
    name: ai-app
    runtime: python
    pythonVersion: "3.12.8"
    plan: free                          # Render free tier
    region: oregon                      # us-west-2 — closest free region
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false                     # Render will prompt you to enter this securely
      - key: MODEL
        value: claude-haiku-4-5
      - key: MAX_TOKENS
        value: "1024"
