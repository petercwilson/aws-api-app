services:
  - type: web
    name: ai-app
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MODEL
        value: claude-haiku-4-5
      - key: MAX_TOKENS
        value: "1024"
